version: "3"

services:
  postgres:
    image: postgres:16
    container_name: vault-postgres
    restart: always
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: vault
      POSTGRES_PASSWORD: vault
      POSTGRES_DB: vaultdb
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data: